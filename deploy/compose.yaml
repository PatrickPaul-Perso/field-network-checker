services:
  fnc-app:
    build:
      context: ${FNC_SOURCE_APP_DIR:-../app}
      args:
        USERNAME: ${FNC_RUNTIME_USER:-fnc}
        USER_UID: ${FNC_RUNTIME_UID:-1000}
        USER_GID: ${FNC_RUNTIME_GID:-1000}
    container_name: fnc-app
    restart: unless-stopped
    network_mode: host
    user: "${FNC_RUNTIME_UID:-1000}:${FNC_RUNTIME_GID:-1000}"
    cap_add:
      - SYS_TIME
    environment:
      TZ: America/Toronto
      FNC_BIND_HOST: "192.168.50.1"
      FNC_ETH_IFNAME: eth0
      FNC_HTTP_PORT: "8080"
      FNC_TARGET_PREFIX: "132.246."
      FNC_DATA_DIR: /data
      FNC_CONFIG_DIR: /config
    volumes:
      - ${FNC_RUNTIME_ROOT:-/opt/field-network-checker}/data:/data
      - ${FNC_RUNTIME_ROOT:-/opt/field-network-checker}/config:/config

networks:
  default:
    driver: bridge
