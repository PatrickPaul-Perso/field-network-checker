services:
  fnc-app:
    build:
      context: /opt/field-network-checker/app
    container_name: fnc-app
    restart: unless-stopped
    network_mode: host
    cap_add:
      - SYS_TIME
    environment:
      TZ: America/Toronto
      FNC_BIND_HOST: "192.168.50.1"
      FNC_ETH_IFNAME: eth0
      FNC_HTTP_PORT: "8080"
      FNC_TARGET_PREFIX: "132.246."
      FNC_DATA_DIR: /data
      FNC_CONFIG_DIR: /config
    volumes:
      - /opt/field-network-checker/data:/data
      - /opt/field-network-checker/config:/config

networks:
  default:
    driver: bridge
